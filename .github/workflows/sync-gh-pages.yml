name: Sync wiki site to gh-pages and cf-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-sync
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static site for GitHub Pages
        uses: actions/jekyll-build-pages@v1
        with:
          source: site
          destination: .site-gh

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .site-gh
          force_orphan: true

      - name: Prepare Cloudflare source
        run: |
          set -euo pipefail

          rm -rf .site-cf-src
          mkdir -p .site-cf-src
          cp -R site/. .site-cf-src/
          cp .site-cf-src/_config.cloudflare.yml .site-cf-src/_config.yml

      - name: Build static site for Cloudflare Pages
        uses: actions/jekyll-build-pages@v1
        with:
          source: .site-cf-src
          destination: .site-cf

      - name: Deploy to cf-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: cf-pages
          publish_dir: .site-cf
          force_orphan: true
